<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIRO Antigravity Trace Explorer | Google Hackathon 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0e27;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
    }
    .header h1 { font-size: 2rem; margin-bottom: 8px; }
    .header p { opacity: 0.9; font-size: 0.95rem; }
    .badge {
      display: inline-block;
      background: #10b981;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 10px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    
    /* Task Plan Flowchart */
    .task-plan {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid #334155;
    }
    .task-plan h2 {
      font-size: 1.25rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .goal-box {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white;
      padding: 16px 20px;
      border-radius: 12px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      font-size: 1.1rem;
    }
    .agents-flow {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .agent-node {
      background: #334155;
      border: 2px solid #475569;
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 140px;
      text-align: center;
      transition: all 0.4s ease;
      position: relative;
      cursor: pointer;
    }
    .agent-node:hover { transform: translateY(-4px); }
    .agent-node.completed {
      background: #064e3b;
      border-color: #10b981;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
    }
    .agent-node.running {
      background: #7c2d12;
      border-color: #f97316;
      animation: pulse 1.5s infinite;
    }
    .agent-node.failed {
      background: #450a0a;
      border-color: #ef4444;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(249, 115, 22, 0); }
    }
    .agent-icon { font-size: 1.5rem; margin-bottom: 6px; }
    .agent-name { font-weight: 600; font-size: 0.85rem; }
    .agent-status { font-size: 0.7rem; opacity: 0.8; margin-top: 4px; }
    
    .arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 1.2rem;
    }
    
    /* Constraints */
    .constraints {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid #334155;
    }
    .constraint-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      margin-bottom: 8px;
      background: #0f172a;
      border-radius: 8px;
      border-left: 4px solid #ef4444;
    }
    .constraint-item.pass { border-left-color: #10b981; }
    .constraint-icon { font-size: 1.2rem; }
    .constraint-text { font-size: 0.9rem; }
    
    /* Timeline */
    .timeline {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #334155;
    }
    .timeline h2 { margin-bottom: 16px; }
    .timeline-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    button:hover { background: #2563eb; transform: scale(1.05); }
    button.secondary { background: #475569; }
    button.secondary:hover { background: #334155; }
    
    .trace-entry {
      padding: 12px;
      margin-bottom: 8px;
      background: #0f172a;
      border-radius: 8px;
      border-left: 3px solid #3b82f6;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      opacity: 0;
      animation: slideIn 0.3s forwards;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .trace-time { color: #94a3b8; font-size: 0.7rem; }
    .trace-agent { color: #60a5fa; font-weight: 600; }
    .trace-action { color: #e2e8f0; }
    
    .fallback-box {
      background: #450a0a;
      border: 2px solid #ef4444;
      border-radius: 12px;
      padding: 16px;
      margin-top: 20px;
      text-align: center;
    }
    .fallback-box h3 { color: #fca5a5; margin-bottom: 8px; }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      border: 1px solid #334155;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #10b981;
    }
    .stat-label { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
    
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧠 CIRO Antigravity Trace Explorer</h1>
      <p>Interactive visualization of multi-agent crisis orchestration <span class="badge">LIVE TRACE</span></p>
    </div>
    
    <div class="stats" id="stats"></div>
    
    <div class="task-plan">
      <h2>📋 Task Plan Execution</h2>
      <div class="goal-box" id="goal">Loading...</div>
      <div class="agents-flow" id="agents"></div>
      <div id="constraints"></div>
    </div>
    
    <div class="timeline">
      <h2>⏱️ Execution Timeline</h2>
      <div class="timeline-controls">
        <button onclick="playTrace()">▶️ Play Execution</button>
        <button class="secondary" onclick="pauseTrace()">⏸️ Pause</button>
        <button class="secondary" onclick="resetTrace()">🔄 Reset</button>
        <button class="secondary" onclick="showOnlyFailures()">⚠️ Failures Only</button>
      </div>
      <div id="trace-container"></div>
    </div>
    
    <div class="fallback-box hidden" id="fallback">
      <h3>🚨 Fallback Triggered</h3>
      <p id="fallback-text"></p>
    </div>
  </div>

  <script>
    let traces = [];
    let taskPlan = null;
    let currentIndex = 0;
    let isPlaying = false;
    let playInterval = null;
    
    // Embedded trace data for file:// compatibility (no server required)
    const EMBEDDED_TRACES = TRACE_DATA; // defined in script tag below
    
    async function loadTraces() {
      try {
        // Try fetch first (works when served via HTTP)
        const response = await fetch('sample_trace.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        traces = await response.json();
      } catch (_e) {
        // Fallback to embedded data (works via file://)
        traces = EMBEDDED_TRACES;
      }
      renderStats();
      extractTaskPlan();
      renderAgents();
      renderConstraints();
    }
    
    function renderStats() {
      const agents = [...new Set(traces.filter(t => t.data?.agent_id).map(t => t.data.agent_id))];
      const actions = traces.filter(t => t.event_type === 'agent_action').length;
      const duration = traces.length > 0 ? 
        Math.round((new Date(traces[traces.length-1].timestamp) - new Date(traces[0].timestamp)) / 1000) : 0;
      
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-value">${agents.length}</div><div class="stat-label">Active Agents</div></div>
        <div class="stat-card"><div class="stat-value">${actions}</div><div class="stat-label">Actions Executed</div></div>
        <div class="stat-card"><div class="stat-value">${duration}s</div><div class="stat-label">Execution Time</div></div>
        <div class="stat-card"><div class="stat-value">${traces.length}</div><div class="stat-label">Trace Events</div></div>
      `;
    }
    
    function extractTaskPlan() {
      const planTrace = traces.find(t => t.event_type === 'task_plan_generated');
      if (planTrace) {
        taskPlan = planTrace.data;
        document.getElementById('goal').textContent = '🎯 ' + taskPlan.goal;
      }
    }
    
    function renderAgents() {
      if (!taskPlan) return;
      const container = document.getElementById('agents');
      const icons = {
        'signal_ingestion': '📡', 'event_detection': '🔍', 'reasoning': '🧠',
        'action_planning': '📋', 'simulation': '⚙️', 'dispatch': '📢',
        'visualization': '📊'
      };
      
      container.innerHTML = taskPlan.steps.map((step, i) => `
        <div class="agent-node" id="agent-${step.agent}" onclick="highlightAgent('${step.agent}')">
          <div class="agent-icon">${icons[step.agent] || '🤖'}</div>
          <div class="agent-name">${step.agent.replace('_', ' ')}</div>
          <div class="agent-status" id="status-${step.agent}">pending</div>
        </div>
        ${i < taskPlan.steps.length - 1 ? '<div class="arrow">→</div>' : ''}
      `).join('');
    }
    
    function renderConstraints() {
      if (!taskPlan) return;
      document.getElementById('constraints').innerHTML = `
        <h3 style="margin: 16px 0 12px;">🔗 Constraints</h3>
        ${taskPlan.constraints.map(c => `
          <div class="constraint-item" id="constraint-${c.replace(/\s/g, '')}">
            <span class="constraint-icon">🔒</span>
            <span class="constraint-text">${c}</span>
          </div>
        `).join('')}
      `;
    }
    
    function playTrace() {
      if (isPlaying) return;
      isPlaying = true;
      resetTrace();
      
      playInterval = setInterval(() => {
        if (currentIndex >= traces.length) {
          pauseTrace();
          return;
        }
        renderTraceEntry(traces[currentIndex]);
        updateAgentStatus(traces[currentIndex]);
        currentIndex++;
      }, 200);
    }
    
    function pauseTrace() {
      isPlaying = false;
      clearInterval(playInterval);
    }
    
    function resetTrace() {
      pauseTrace();
      currentIndex = 0;
      document.getElementById('trace-container').innerHTML = '';
      document.querySelectorAll('.agent-node').forEach(n => {
        n.className = 'agent-node';
        n.querySelector('.agent-status').textContent = 'pending';
      });
      document.querySelectorAll('.constraint-item').forEach(c => c.classList.remove('pass'));
      document.getElementById('fallback').classList.add('hidden');
    }
    
    function renderTraceEntry(trace) {
      const div = document.createElement('div');
      div.className = 'trace-entry';
      const time = new Date(trace.timestamp).toLocaleTimeString();
      
      if (trace.event_type === 'agent_action') {
        div.innerHTML = `
          <span class="trace-time">[${time}]</span>
          <span class="trace-agent">${trace.data.agent_id}</span>
          <span class="trace-action"> → ${trace.data.action}</span>
          ${trace.data.details?.status ? `<span style="color: #10b981;"> (${trace.data.details.status})</span>` : ''}
        `;
      } else if (trace.event_type === 'task_plan_generated') {
        div.style.borderLeftColor = '#f59e0b';
        div.innerHTML = `<span class="trace-time">[${time}]</span> 📋 Task plan generated with ${trace.data.steps.length} steps`;
      } else {
        div.innerHTML = `<span class="trace-time">[${time}]</span> ${trace.event_type}`;
      }
      
      const container = document.getElementById('trace-container');
      container.insertBefore(div, container.firstChild);
    }
    
    function updateAgentStatus(trace) {
      if (trace.event_type === 'agent_action' && trace.data.agent_id) {
        const agentEl = document.getElementById(`agent-${trace.data.agent_id}`);
        const statusEl = document.getElementById(`status-${trace.data.agent_id}`);
        if (agentEl && statusEl) {
          if (trace.data.action === 'initialize') {
            agentEl.classList.add('running');
            statusEl.textContent = 'initializing...';
          } else if (trace.data.details?.status === 'ready') {
            agentEl.classList.remove('running');
            agentEl.classList.add('completed');
            statusEl.textContent = 'ready ✅';
          } else {
            agentEl.classList.add('completed');
            statusEl.textContent = 'executed ✅';
          }
        }
      }
    }
    
    function highlightAgent(agentId) {
      document.querySelectorAll('.trace-entry').forEach(el => el.style.opacity = '0.3');
      document.querySelectorAll('.trace-entry').forEach(el => {
        if (el.textContent.includes(agentId)) el.style.opacity = '1';
      });
    }
    
    function showOnlyFailures() {
      document.querySelectorAll('.trace-entry').forEach(el => {
        if (el.textContent.includes('error') || el.textContent.includes('failed')) {
          el.style.display = 'block';
        } else {
          el.style.display = 'none';
        }
      });
    }
    
    loadTraces();
  </script>
</body>
</html>
